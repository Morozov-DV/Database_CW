{% extends 'todo/base.html' %}
{% block content %}
<div class="flex items-center justify-center pt-20 px-4">
    <div class="bg-white p-8 rounded-2xl shadow-sm border border-slate-200 w-full max-w-md">
        <h2 class="text-2xl font-bold text-slate-900 text-center mb-1">Ласкаво просимо</h2>
        <p class="text-slate-500 text-sm text-center mb-6">Увійдіть у свій акаунт, щоб продовжити</p>
        
        <form method="post" class="space-y-4">
            {% csrf_token %}
            {% if form.errors %}
                <div class="p-3 bg-red-50 text-red-600 text-sm rounded-xl border border-red-100">
                    Неправильний логін або пароль. Спробуйте знову.
                </div>
            {% endif %}
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">Ім'я користувача</label>
                <input type="text" name="username" required class="w-full px-3 py-2 border border-slate-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-slate-800 transition-shadow">
            </div>
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">Пароль</label>
                <input type="password" name="password" required class="w-full px-3 py-2 border border-slate-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-slate-800 transition-shadow">
            </div>
            <button type="submit" class="w-full bg-slate-800 hover:bg-slate-900 text-white font-medium py-2.5 rounded-xl transition-colors shadow-sm mt-2">Увійти</button>
        </form>
        
        <div class="mt-6 text-center text-sm text-slate-500">
            Немає облікового запису? <a href="{% url 'signup' %}" class="text-slate-800 font-semibold hover:underline">Зареєструватися</a>
        </div>
    </div>
</div>
{% endblock %}
