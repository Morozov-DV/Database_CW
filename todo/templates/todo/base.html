<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskBoard — Планування задач</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
    </style>
</head>
<body>
    <nav class="bg-white border-b border-slate-200 px-6 py-3 flex justify-between items-center shadow-sm">
        <a href="{% url 'dashboard' %}" class="flex items-center gap-2 font-bold text-xl text-slate-800">
            <span class="bg-slate-800 text-white p-1.5 rounded-lg text-sm">TB</span> TaskBoard
        </a>
        <div class="flex items-center gap-4">
            {% if request.user.is_authenticated %}
                <span class="text-sm text-slate-600 font-medium">Користувач: <strong>{{ request.user.username }}</strong></span>
                <a href="{% url 'logout' %}" class="text-sm bg-slate-100 hover:bg-slate-200 text-slate-700 px-3 py-1.5 rounded-lg font-medium transition-colors">Вихід</a>
            {% else %}
                <a href="{% url 'login' %}" class="text-sm text-slate-600 font-medium hover:text-slate-900">Вхід</a>
                <a href="{% url 'signup' %}" class="text-sm bg-slate-800 hover:bg-slate-900 text-white px-3 py-1.5 rounded-lg font-medium transition-colors">Реєстрація</a>
            {% endif %}
        </div>
    </nav>

    <main class="min-h-[calc(100vh-61px)]">
        {% block content %}
        {% endblock %}
    </main>
</body>
</html>
